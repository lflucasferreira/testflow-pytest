name: PyTest E2E

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  setup:
    name: Install dependencies
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout test suite
        uses: actions/checkout@v5

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Cache venv
        id: cache-venv
        uses: actions/cache@v5
        with:
          path: .venv
          key: pytest-venv-${{ hashFiles('requirements.txt') }}

      - name: Install Python dependencies
        if: steps.cache-venv.outputs.cache-hit != 'true'
        run: |
          python -m venv .venv
          . .venv/bin/activate
          pip install -r requirements.txt

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: 24

      - name: Cache node_modules
        id: cache-node
        uses: actions/cache@v5
        with:
          path: node_modules
          key: pytest-node-${{ hashFiles('package-lock.json') }}

      - name: Install npm dependencies
        if: steps.cache-node.outputs.cache-hit != 'true'
        run: npm ci

      - name: Install Playwright browsers
        run: |
          . .venv/bin/activate
          playwright install chromium firefox webkit --with-deps

  test:
    name: PyTest — ${{ matrix.suite }}
    runs-on: ubuntu-latest
    needs: setup
    timeout-minutes: 15
    services:
      testflow:
        image: qaschool/testflow:latest
        ports:
          - 5050:5050
        options: >-
          --health-interval 15s
          --health-timeout 10s
          --health-retries 6
          --health-start-period 90s
    strategy:
      fail-fast: false
      matrix:
        suite:
          - api
          - smoke
          - smoke-firefox
          - smoke-webkit
          - auth
          - dashboard
          - team
          - settings
          - components
          - wizard
          - activity
          - advanced
          - states
          - a11y
          - visual
    steps:
      - name: Checkout test suite
        uses: actions/checkout@v5

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Restore venv
        uses: actions/cache@v5
        with:
          path: .venv
          key: pytest-venv-${{ hashFiles('requirements.txt') }}

      - name: Install Playwright browsers
        run: |
          . .venv/bin/activate
          case "${{ matrix.suite }}" in
            smoke-firefox) playwright install firefox --with-deps ;;
            smoke-webkit) playwright install webkit --with-deps ;;
            *) playwright install chromium --with-deps ;;
          esac

      - name: Verify TestFlow is reachable
        continue-on-error: true
        run: curl -sf http://localhost:5050/health && echo "TestFlow OK" || echo "TestFlow not reachable"

      - name: Run PyTest — ${{ matrix.suite }}
        env:
          CI: "true"
          DEMO_PASSWORD: ${{ secrets.DEMO_PASSWORD }}
        run: |
          . .venv/bin/activate
          npm run test:${{ matrix.suite }}

      - name: Upload Allure results
        if: always()
        uses: actions/upload-artifact@v6
        with:
          name: allure-results-${{ matrix.suite }}
          path: allure-results/
          if-no-files-found: ignore

      - name: Upload test results on failure
        if: failure()
        uses: actions/upload-artifact@v6
        with:
          name: test-results-${{ matrix.suite }}
          path: test-results/
          if-no-files-found: ignore

  smoke-grep:
    name: PyTest — @smoke marker
    runs-on: ubuntu-latest
    needs: setup
    timeout-minutes: 10
    services:
      testflow:
        image: qaschool/testflow:latest
        ports:
          - 5050:5050
        options: >-
          --health-interval 15s
          --health-timeout 10s
          --health-retries 6
          --health-start-period 90s
    steps:
      - name: Checkout test suite
        uses: actions/checkout@v5

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Restore venv
        uses: actions/cache@v5
        with:
          path: .venv
          key: pytest-venv-${{ hashFiles('requirements.txt') }}

      - name: Install Playwright Chromium
        run: |
          . .venv/bin/activate
          playwright install chromium --with-deps

      - name: Run @smoke tagged tests
        env:
          CI: "true"
          DEMO_PASSWORD: ${{ secrets.DEMO_PASSWORD }}
        run: |
          . .venv/bin/activate
          npm run test:grep:smoke

      - name: Upload Allure results
        if: always()
        uses: actions/upload-artifact@v6
        with:
          name: allure-results-smoke-grep
          path: allure-results/
          if-no-files-found: ignore

  publish:
    name: Build Allure report & publish GitHub Pages
    runs-on: ubuntu-latest
    needs: [test, smoke-grep]
    if: always() && github.event_name == 'push' && github.ref == 'refs/heads/main'
    timeout-minutes: 15
    permissions:
      contents: read
      pages: write
      id-token: write
    steps:
      - name: Checkout test suite
        uses: actions/checkout@v5

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: 24

      - name: Install npm dependencies
        run: npm ci

      - name: Download Allure results
        uses: actions/download-artifact@v7
        with:
          pattern: allure-results-*
          merge-multiple: true
          path: allure-results
        continue-on-error: true

      - name: Generate Allure report
        run: npm run report:allure
        continue-on-error: true

      - name: Build GitHub Pages site
        run: npm run pages:build

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: site

      - name: Upload Allure report
        if: always()
        uses: actions/upload-artifact@v6
        with:
          name: allure-report-pages
          path: |
            allure-report/
            allure-results/
            site/report/
          if-no-files-found: ignore

  deploy:
    name: Deploy to GitHub Pages
    needs: publish
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
