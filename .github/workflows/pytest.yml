name: PyTest E2E

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  test:
    name: PyTest — ${{ matrix.browser }}
    runs-on: ubuntu-latest
    timeout-minutes: ${{ matrix.browser == 'chromium' && 40 || 20 }}
    strategy:
      fail-fast: false
      matrix:
        browser: [chromium, firefox, webkit]
    services:
      testflow:
        image: qaschool/testflow:latest
        ports:
          - 5050:5050
        options: >-
          --health-interval 15s
          --health-timeout 10s
          --health-retries 6
          --health-start-period 90s
    steps:
      - name: Checkout test suite
        uses: actions/checkout@v5

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Cache venv
        id: cache-venv
        uses: actions/cache@v5
        with:
          path: .venv
          key: pytest-venv-${{ hashFiles('requirements.txt') }}

      - name: Install Python dependencies
        if: steps.cache-venv.outputs.cache-hit != 'true'
        run: |
          python -m venv .venv
          . .venv/bin/activate
          pip install -r requirements.txt

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: 24

      - name: Cache Playwright browsers
        uses: actions/cache@v5
        with:
          path: ~/.cache/ms-playwright
          key: ms-playwright-${{ matrix.browser }}-${{ hashFiles('requirements.txt') }}

      - name: Install Playwright browser
        run: |
          . .venv/bin/activate
          playwright install ${{ matrix.browser }} --with-deps

      - name: Verify TestFlow is reachable
        continue-on-error: true
        run: curl -sf http://localhost:5050/health && echo "TestFlow OK" || echo "TestFlow not reachable"

      - name: Run PyTest — ${{ matrix.browser }}
        env:
          CI: "true"
          DEMO_PASSWORD: ${{ secrets.DEMO_PASSWORD }}
        run: |
          . .venv/bin/activate
          npm run test:ci:${{ matrix.browser }}

      - name: Upload Allure results
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: allure-results-${{ matrix.browser }}
          path: allure-results/
          if-no-files-found: ignore

      - name: Upload test results on failure
        if: failure()
        uses: actions/upload-artifact@v7
        with:
          name: test-results-${{ matrix.browser }}
          path: test-results/
          if-no-files-found: ignore

  publish-pages:
    name: Build site & publish GitHub Pages
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    timeout-minutes: 15
    permissions:
      contents: read
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Checkout test suite
        uses: actions/checkout@v5

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: 24

      - name: Install dependencies
        run: npm ci

      - name: Build GitHub Pages site
        run: npm run pages:build

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v5
        with:
          path: site
          include-hidden-files: true

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5

  publish-allure:
    name: Publish Allure report to GitHub Pages
    runs-on: ubuntu-latest
    needs:
      - test
      - publish-pages
    if: always() && github.event_name == 'push' && github.ref == 'refs/heads/main'
    timeout-minutes: 15
    permissions:
      actions: write
      contents: read
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Checkout test suite
        uses: actions/checkout@v5

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: 24

      - name: Install dependencies
        run: npm ci

      - name: Download Allure results
        if: always()
        uses: actions/download-artifact@v7
        with:
          pattern: allure-results-*
          merge-multiple: true
          path: allure-results
        continue-on-error: true

      - name: Prepare Allure report for Pages
        if: always()
        run: npm run pages:prepare-allure
        continue-on-error: true

      - name: Build GitHub Pages site
        run: npm run pages:build

      - name: Delete previous Pages artifact
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          ids="$(gh api "/repos/${GITHUB_REPOSITORY}/actions/runs/${GITHUB_RUN_ID}/artifacts" \
            --jq '.artifacts[] | select(.name == "github-pages") | .id')"
          if [ -z "$ids" ]; then
            echo "No github-pages artifact to delete"
            exit 0
          fi
          for id in $ids; do
            echo "Deleting artifact ${id}"
            gh api -X DELETE "/repos/${GITHUB_REPOSITORY}/actions/artifacts/${id}"
          done

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v5
        with:
          path: site
          include-hidden-files: true

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5

      - name: Upload Allure report
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: allure-report-pages
          path: |
            allure-report/
            allure-results/
            pages-allure-staging/
            site/report/
          if-no-files-found: ignore
